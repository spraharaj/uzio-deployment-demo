apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/spraharaj/uzio-deployment-demo.git
    targetRevision: HEAD
    path: charts/config-server
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
